name: hrm_focus_flutter
description: "Focus HRM — Flutter mobile app (iOS & Android). Backed by the existing Supabase project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # Backend (same Supabase project as the React app)
  supabase_flutter: ^2.8.0

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # Secure local session storage (replaces web localStorage)
  flutter_secure_storage: ^9.2.2

  # Environment / config
  flutter_dotenv: ^5.1.0

  # Form validation
  form_builder_validators: ^11.0.0

  # CSV export / share (Live Attendance export)
  share_plus: ^10.1.4
  path_provider: ^2.1.5

  # Open external links (Documents → Google Drive)
  url_launcher: ^6.3.0

  # Inline document preview (Google Drive /preview embeds)
  webview_flutter: ^4.7.0

  # Avatar upload (Settings → profile photo)
  image_picker: ^1.1.2

  # Hiring post attachments (pick a JD PDF/any file)
  file_picker: ^8.1.2

  # IANA timezone math (Timezone Management: local time, abbr, UTC offset)
  timezone: ^0.9.4

  # Invoice PDF export + print/share (mobile-safe; replaces web jsPDF)
  pdf: ^3.11.1
  printing: ^5.13.3

  # Local/tray notifications mirrored from the notifications table (Phase 2a;
  # no Firebase/FCM yet — killed-app push is Phase 2b).
  flutter_local_notifications: ^18.0.1

  cupertino_icons: ^1.0.8

  intl: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# Launcher icon generated from the provided brand logo (512x512).
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/focus-logo.png
  adaptive_icon_background: "#0E1F3D"
  adaptive_icon_foreground: assets/images/focus-logo.png
  # iOS icons cannot have transparency (Apple shows blank/black otherwise),
  # so flatten the logo onto the brand navy background.
  remove_alpha_ios: true
  background_color_ios: "#0E1F3D"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
